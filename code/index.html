<!DOCTYPE html>
<html>
<head>
    <title>Robot Arm 3D Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; left: 10px; color: white; 
            background: rgba(0, 0, 0, 0.7); 
            padding: 10px; 
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">Estado: Conectando...</div>
    <script>
        const ESLABON_COLORS = [
            0x228B22, 
            0xFFFF00, 
            0xFFA500, 
            0x00FFFF, 
            0xFF00FF  
        ];
        const COLLISION_COLOR = 0xFF0000;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.background = new THREE.Color(0x333333);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // Plano base
        const planeGeometry = new THREE.PlaneGeometry(30, 30);
        const planeMaterial = new THREE.MeshPhongMaterial({ color: 0x666666, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);

        // Ajuste: el plano ahora debe estar en Y=0 (horizontal)
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // ✔ Vista perpendicular al plano Y (frontal)
        camera.position.set(0, 0, 25);
        camera.lookAt(0, 0, 0);

        let spheresGroup = new THREE.Group();
        scene.add(spheresGroup);

        function updateScene(data) {
            spheresGroup.clear();

            const isColliding = data.collision_detected;
            const servoIndex = data.active_servo_index || 0;

            document.getElementById('info').innerHTML = 
                `🤖 Servo Activo: Eslabón ${servoIndex}<br>` +
                `Estado: ${isColliding ? '<span style="color:red">¡COLISIÓN!</span>' : '<span style="color:green">OK</span>'}<br>` +
                `Ángulos: ${data.angles.map(a => a.toFixed(1)).join(', ')}`;

            const radius = data.sphere_radius;
            const collidingCenters = data.colliding_centers.map(
                c => c.map(v => v.toFixed(6)).join(',')
            );

            data.spheres.forEach((eslabon, i) => {
                const eslabonColor = ESLABON_COLORS[i];

                eslabon.forEach(center => {
                    const [x_sim, y_sim, z_sim] = center;

                    // ✔ Conversión: Z → Y
                    const x = x_sim;
                    const y = z_sim;
                    const z = y_sim;

                    let color = eslabonColor;
                    const centerString = center.map(v => v.toFixed(6)).join(',');

                    if (isColliding && collidingCenters.includes(centerString)) {
                         color = COLLISION_COLOR;
                    }

                    const sphere = new THREE.Mesh(
                        new THREE.SphereGeometry(radius, 16, 16),
                        new THREE.MeshPhongMaterial({ color })
                    );

                    // ✔ Usar la conversión correcta
                    sphere.position.set(x, y, z);
                    spheresGroup.add(sphere);
                });
            });
        }

        function fetchData() {
            fetch('http://192.168.0.193/data')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                    return response.json();
                })
                .then(updateScene)
                .catch(e => {
                    document.getElementById('info').innerHTML = 
                        `<span style="color:red">Error de Conexión: ${e.message}</span>`;
                });
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        setInterval(fetchData, 100);
        animate();
    </script>
</body>
</html>
